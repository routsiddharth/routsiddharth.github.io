# Cloudflare Worker config for the Kalshi read-only proxy.
#
# Deploy (CLI):
#   npm i -g wrangler
#   cd kalshi-proxy
#   wrangler deploy
#   wrangler secret put KALSHI_KEY_ID        # paste: b88050cb-2ef8-4231-ae37-abe248699ca0
#   wrangler secret put KALSHI_PRIVATE_KEY   # paste the PKCS#8 PEM (see SETUP.md)
#
# Then copy the printed https://kalshi-proxy.<your-subdomain>.workers.dev URL
# into WORKER_URL at the top of ../ishanai.html.

name = "kalshi-proxy"
main = "worker.js"
compatibility_date = "2026-06-01"

# Optional: restrict the proxy to your site only (otherwise defaults to "*").
# [vars]
# ALLOW_ORIGIN = "https://sidrout.com"
